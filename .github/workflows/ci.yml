name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mcp google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client pytest

      - name: Run sanity checks (CI-safe tests only)
        run: |
          python -m pytest tests/test_sanity.py -v -m "not local_only"
